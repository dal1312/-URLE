name: Validate Forli Digital Twin

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate project structure
        run: python 13_PIPELINE/scripts/validate_project.py
      - name: Report GCP readiness
        run: python 13_PIPELINE/scripts/check_gcp_status.py
