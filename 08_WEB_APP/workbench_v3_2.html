<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>URLE GCP Workbench v3.2</title><style>body{margin:0;font-family:system-ui,Arial;background:#efe6d7;color:#2a231a}header{padding:12px 16px;background:#ddc8a6;border-bottom:1px solid #b89b6d;display:flex;justify-content:space-between;gap:12px}main{display:grid;grid-template-columns:360px 1fr 1fr 360px;height:calc(100vh - 62px)}aside,.panel{background:#fff8eb;padding:10px;overflow:auto;border-right:1px solid #c6aa7e}.panel{border-left:1px solid #c6aa7e;border-right:0}.viewer{background:#222;position:relative;overflow:hidden}.stage{position:absolute;left:0;top:0;transform-origin:0 0}.stage img,.stage svg{position:absolute;left:0;top:0}.stage img{pointer-events:none;user-select:none}.card{background:white;border:1px solid #ddc9a5;border-radius:8px;padding:7px;margin:6px 0;font-size:12px;cursor:pointer}.sel{outline:3px solid #111}.badge{padding:1px 6px;border-radius:999px;background:#eee;margin-right:4px}button,a{border:1px solid #b89b6d;background:#fff3dc;border-radius:8px;padding:7px 9px;margin:3px;cursor:pointer;color:#2a231a;text-decoration:none;display:inline-block}input,select,textarea{width:100%;box-sizing:border-box;margin:4px 0 8px;padding:7px;border:1px solid #bca27a;border-radius:8px}label{font-size:12px;font-weight:700}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px}.pt{stroke:#111;stroke-width:1.5;cursor:pointer}.src{fill:#e00000}.dst{fill:#1a8f45}.lbl{font-size:13px;paint-order:stroke;stroke:white;stroke-width:4;fill:#111;pointer-events:none}.warn{background:#fff0ca;border:1px solid #d2a34d;border-radius:9px;padding:8px;margin:6px 0;font-size:12px}</style></head><body><header><div><b>URLE GCP Workbench v3.2</b><div id="meta">loading...</div></div><div><a href="readiness.html">Dashboard readiness</a><button id="saveAll">Salva locale</button><button id="backup">Backup JSON</button><button id="reset">Reset locale</button></div></header><main><aside><div class="warn">SHIFT+trascina per pan. Rotella per zoom. Clic su CTR per assegnare target EPSG:25832.</div><label>Foglio</label><select id="sheet"></select><label>Tile CTR</label><select id="tile"></select><label>Filtro</label><select id="filter"><option value="">Tutti</option><option>KEEP</option><option>REVIEW</option><option>PRIORITY_REVIEW</option><option>LOW_PRIORITY_REVIEW</option><option>REJECT</option></select><button id="fitH">Fit storico</button><button id="fitC">Fit CTR</button><button id="exportCsv">Export CSV</button><div id="list"></div></aside><div class="viewer" id="hv"><div class="stage" id="hs"><img id="hi"><svg id="hsvg"></svg></div></div><div class="viewer" id="cv"><div class="stage" id="cs"><img id="ci"><svg id="csvg"></svg></div></div><div class="panel"><h3>Scheda GCP</h3><div id="form">Seleziona punto.</div><div id="status" class="warn"></div></div></main><script src="workbench_state.js"></script><script>
let D,currentSheet,currentTile,selected=null,hv={x:0,y:0,s:1},cv={x:0,y:0,s:1};const $=id=>document.getElementById(id);function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function apply(el,v){el.style.transform=`translate(${v.x}px,${v.y}px) scale(${v.s})`}function fit(view,img,stage,v){if(!img.naturalWidth)return;v.s=Math.min(view.clientWidth/img.naturalWidth,view.clientHeight/img.naturalHeight)*.96;v.x=(view.clientWidth-img.naturalWidth*v.s)/2;v.y=(view.clientHeight-img.naturalHeight*v.s)/2;apply(stage,v)}function S(svg,t,a){let n=document.createElementNS('http://www.w3.org/2000/svg',t);Object.entries(a).forEach(([k,v])=>n.setAttribute(k,v));svg.appendChild(n);return n}function hist(){return D.historical_previews.find(x=>x.sheet_id===currentSheet)}function tile(){return D.ctr_tiles.find(x=>x.tile===currentTile)}function gcps(){let f=$('filter').value;return D.gcps.filter(g=>g.sheet_id===currentSheet&&(!f||g.decision===f))}function ok(g){return g.decision==='KEEP'&&g.target_easting_epsg25832&&g.target_northing_epsg25832&&g.target_tile}function progress(){let sheets=[...new Set(D.gcps.map(g=>g.sheet_id))];let ready=sheets.filter(s=>D.gcps.filter(g=>g.sheet_id===s&&ok(g)).length>=8).length;let total=D.gcps.filter(ok).length;$('meta').textContent=`${total}/32 GCP verificati · ${ready}/4 fogli READY`}
function previewToMap(t,px,py){let fx=px*t.width/t.preview_width,fy=py*t.height/t.preview_height,gt=t.transform;return [gt[0]*fx+gt[1]*fy+gt[2],gt[3]*fx+gt[4]*fy+gt[5],fx,fy]}function ph(label,w,h){let svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="#eee6d8"/><text x="50%" y="50%" text-anchor="middle" font-size="32">${label}</text></svg>`;return 'data:image/svg+xml,'+encodeURIComponent(svg)}function loadImg(img,urls,cb){let i=0;img.onerror=()=>{i++;img.src=urls[i]||ph('missing',1200,900)};img.onload=cb;img.src=urls[0]}
function render(){hsvg.innerHTML='';csvg.innerHTML='';hsvg.setAttribute('width',hi.naturalWidth||1);hsvg.setAttribute('height',hi.naturalHeight||1);csvg.setAttribute('width',ci.naturalWidth||1);csvg.setAttribute('height',ci.naturalHeight||1);let h=hist();gcps().forEach(g=>{let x=+g.source_x*(h.scale_x||1),y=+g.source_y*(h.scale_y||1);let c=S(hsvg,'circle',{cx:x,cy:y,r:11,class:'pt src'});c.onclick=e=>{e.stopPropagation();select(g.gcp_id)};let l=S(hsvg,'text',{x:x+14,y:y+5,class:'lbl'});l.textContent=g.gcp_id.split('_').pop();if(g.target_preview_x&&g.target_preview_y){let d=S(csvg,'circle',{cx:g.target_preview_x,cy:g.target_preview_y,r:11,class:'pt dst'});d.onclick=e=>{e.stopPropagation();select(g.gcp_id)}}});renderList();progress();if(selected)select(selected.gcp_id,false)}function renderList(){list.innerHTML='';gcps().forEach(g=>{let e=document.createElement('div');e.className='card'+(selected&&selected.gcp_id===g.gcp_id?' sel':'');e.innerHTML=`<b>${esc(g.gcp_id)}</b> <span class="badge">${esc(g.decision)}</span><span class="badge">${esc(g.confidence)}</span><div>${esc(g.candidate_name)}</div>`;e.onclick=()=>select(g.gcp_id);list.appendChild(e)})}
function select(id,r=true){selected=D.gcps.find(g=>g.gcp_id===id);if(!selected)return;if(r)render();form.innerHTML=`<b>${esc(selected.gcp_id)}</b><p>${esc(selected.candidate_name)}</p><label>Decisione</label><select id="dec"><option>KEEP</option><option>REJECT</option><option>REVIEW</option><option>PRIORITY_REVIEW</option><option>LOW_PRIORITY_REVIEW</option></select><div class="grid2"><div><label>Source X</label><input id="sx" value="${esc(selected.source_x)}"></div><div><label>Source Y</label><input id="sy" value="${esc(selected.source_y)}"></div></div><div class="grid2"><div><label>Target E</label><input id="te" value="${esc(selected.target_easting_epsg25832||'')}"></div><div><label>Target N</label><input id="tn" value="${esc(selected.target_northing_epsg25832||'')}"></div></div><label>Tile</label><input id="tt" value="${esc(selected.target_tile||'')}"><label>Note</label><textarea id="no">${esc(selected.note||'')}</textarea><button onclick="saveForm()">Salva punto</button><button onclick="mark('KEEP')">KEEP</button><button onclick="mark('REJECT')">REJECT</button>`;dec.value=selected.decision}window.saveForm=()=>{if(!selected)return;selected.decision=dec.value;selected.source_x=sx.value;selected.source_y=sy.value;selected.target_easting_epsg25832=te.value;selected.target_northing_epsg25832=tn.value;selected.target_tile=tt.value;selected.note=no.value;let t=URLEState.save(D);status.textContent='Salvato locale: '+t;render()};window.mark=v=>{selected.decision=v;saveForm()};
cv.addEventListener('click',e=>{if(!selected)return;let r=cv.getBoundingClientRect(),px=(e.clientX-r.left-cv.x)/cv.s,py=(e.clientY-r.top-cv.y)/cv.s;if(px<0||py<0||px>ci.naturalWidth||py>ci.naturalHeight)return;let [E,N,fx,fy]=previewToMap(tile(),px,py);Object.assign(selected,{target_preview_x:px.toFixed(2),target_preview_y:py.toFixed(2),target_full_x:fx.toFixed(2),target_full_y:fy.toFixed(2),target_easting_epsg25832:E.toFixed(3),target_northing_epsg25832:N.toFixed(3),target_tile:currentTile,match_method:'MANUAL_CLICK_ON_CTR_PREVIEW',decision:'KEEP'});URLEState.save(D);render()});function loadSheet(s){currentSheet=s;let h=hist(),orig=h.file.replace('img/historical/','../02_RASTER_STORICI/').replace('_enhanced.jpg','.jpg');loadImg(hi,[h.file,orig,ph(s,h.preview_width||1200,h.preview_height||900)],()=>{fit(hv,hi,hs,hv);render()})}function loadTile(t){currentTile=t;let x=tile();loadImg(ci,['img/ctr/'+x.preview,x.preview,'../03_CTR_MODERNA/'+x.preview,ph('CTR '+t,x.preview_width||1800,x.preview_height||1500)],()=>{fit(cv,ci,cs,cv);render()})}function pan(view,stage,v){let d=null;view.addEventListener('wheel',e=>{e.preventDefault();let old=v.s;v.s*=e.deltaY<0?1.12:.89;v.s=Math.max(.08,Math.min(8,v.s));let r=view.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;v.x=mx-(mx-v.x)*(v.s/old);v.y=my-(my-v.y)*(v.s/old);apply(stage,v)},{passive:false});view.addEventListener('pointerdown',e=>{if(e.shiftKey)d={x:e.clientX,y:e.clientY,ox:v.x,oy:v.y}});window.addEventListener('pointermove',e=>{if(d){v.x=d.ox+e.clientX-d.x;v.y=d.oy+e.clientY-d.y;apply(stage,v)}});window.addEventListener('pointerup',()=>d=null)}
fitH.onclick=()=>fit(hv,hi,hs,hv);fitC.onclick=()=>fit(cv,ci,cs,cv);filter.onchange=render;saveAll.onclick=()=>{status.textContent='Salvato locale: '+URLEState.save(D)};backup.onclick=()=>URLEState.exportJson(D);reset.onclick=()=>{if(confirm('Cancellare stato locale?')){URLEState.clear();location.reload()}};exportCsv.onclick=()=>{let headers=['sheet_id','gcp_id','candidate_name','source_x','source_y','decision','target_easting_epsg25832','target_northing_epsg25832','target_tile','target_preview_x','target_preview_y','target_full_x','target_full_y','match_method','confidence','note'];let csv=headers.join(',')+'\n'+D.gcps.map(g=>headers.map(h=>'"'+String(g[h]??'').replaceAll('"','""')+'"').join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='GCP_point_matching_v3_2_working.csv';a.click()};
fetch('point_matching_v2_7.json').then(r=>r.json()).then(d=>{D=URLEState.load(d);[...new Set(D.historical_previews.map(h=>h.sheet_id))].forEach(s=>sheet.add(new Option(s,s)));D.ctr_tiles.forEach(t=>tile.add(new Option(t.tile,t.tile)));sheet.onchange=e=>loadSheet(e.target.value);tile.onchange=e=>loadTile(e.target.value);pan(hv,hs,hv);pan(cv,cs,cv);loadSheet(sheet.value);loadTile(tile.value);progress()});
</script></body></html>
